<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up</title>

<style>
:root{
  --bg:#0b0f1a;
  --blue:#00f2ff;
  --cyan:#00ffe1;
  --purple:#8a2eff;
  --text:#eafcff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  scroll-behavior:smooth;
}

/* Animated gradient background */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 30%, #141433, transparent),
    radial-gradient(circle at 80% 70%, #220044, transparent);
  animation: bgMove 20s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes bgMove{
  from{ transform:translate(0,0); }
  to{ transform:translate(-12%,-10%); }
}

section{
  min-height:100vh;
  padding:80px 20px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  opacity:0;
  transform:translateY(50px);
  transition:1s ease;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

h1{
  font-size:3rem;
  background:linear-gradient(90deg,var(--blue),var(--purple));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  margin-top:20px;
  opacity:.8;
}

.btn{
  margin-top:35px;
  padding:14px 32px;
  border-radius:40px;
  border:2px solid var(--blue);
  background:transparent;
  color:var(--blue);
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  background:var(--blue);
  color:black;
  box-shadow:0 0 30px var(--blue);
  transform:scale(1.05);
}

/* Neon stat cards */
.cards{
  display:flex;
  flex-wrap:wrap;
  gap:25px;
  justify-content:center;
  margin-top:30px;
}

.card{
  width:260px;
  padding:25px;
  background:#111;
  border-radius:15px;
  border:1px solid var(--purple);
  cursor:pointer;
  transition:.3s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 30px var(--purple);
}

/* Typing text */
.typing{
  margin-top:20px;
  font-size:1.2rem;
  opacity:.9;
  min-height:40px;
}

/* Unlock message */
.hidden{
  margin-top:25px;
  opacity:0;
  transform:translateY(20px);
  transition:.6s;
}

.hidden.show{
  opacity:1;
  transform:translateY(0);
}

/* Cursor glow */
.cursor{
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--cyan);
  position:fixed;
  pointer-events:none;
  mix-blend-mode:screen;
  filter:blur(8px);
  opacity:.7;
  z-index:999;
}

footer{
  padding:20px;
  text-align:center;
  opacity:.4;
}

@media(max-width:600px){
  h1{ font-size:2.2rem; }
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<script>
const friendName = "Gokul";
</script>

<section>
  <h1 id="hero"></h1>
  <p class="subtitle">Another year. New achievements unlocked.</p>
  <button class="btn" onclick="nextSection()">Enter</button>
</section>

<section>
  <h2>Core Upgrades</h2>
  <div class="cards">
    <div class="card">Resilience +10</div>
    <div class="card">XP Multiplier Active</div>
    <div class="card">Skill Tree Expanded</div>
  </div>
  <div class="typing" id="typingText"></div>
</section>

<section>
  <h2>Final Unlock</h2>
  <button class="btn" onclick="unlock()">Unlock Achievement</button>
  <p class="hidden" id="finalMsg">
    Achievement Unlocked: +1 Year of Greatness.
  </p>
</section>

<footer>
Built with code & chaos.
</footer>

<script>

/* Dynamic Name */
document.getElementById("hero").innerText =
`Level Up, ${Gokul} 🎮`;

/* Scroll reveal animation */
const sections = document.querySelectorAll("section");
window.addEventListener("scroll", ()=>{
  sections.forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight-100){
      sec.classList.add("show");
    }
  });
});

/* Smooth scroll */
function nextSection(){
  sections[1].scrollIntoView({behavior:"smooth"});
}

/* Typing effect */
const text = "You don’t age. You upgrade. This year? Bigger wins only.";
let index = 0;
function type(){
  if(index < text.length){
    document.getElementById("typingText").innerHTML += text.charAt(index);
    index++;
    setTimeout(type,40);
  }
}
type();

/* Unlock animation */
function unlock(){
  document.getElementById("finalMsg").classList.add("show");
}

/* Cursor glow */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove",(e)=>{
  cursor.style.left = e.clientX-9 + "px";
  cursor.style.top = e.clientY-9 + "px";
});
</script>

</body>
</html>
